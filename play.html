			<script>
				// Filter functionality with animations
				document.addEventListener('DOMContentLoaded', function() {
					const filterPills = document.querySelectorAll('.filter-pill');
					const artCards = document.querySelectorAll('.art-card');
					const lockedCard = document.querySelector('.locked-card');
					const lockedModalElement = document.getElementById('lockedProjectModal');
					const lockedProjectModal = lockedModalElement ? new bootstrap.Modal(lockedModalElement) : null;
					const lockedProjectForm = document.getElementById('lockedProjectForm');
					const lockedProjectPassword = document.getElementById('lockedProjectPassword');
					const lockedProjectFeedback = document.getElementById('lockedProjectFeedback');
					const lockedDestination = '/sweep-spot/dist/index.html';
					const lockedPassword = 'goose';

					// Add click functionality for expanding cards
					artCards.forEach(card => {
						card.addEventListener('click', function() {
							if (this.classList.contains('locked-card')) {
								if (lockedProjectFeedback) lockedProjectFeedback.textContent = '';
								if (lockedProjectForm) lockedProjectForm.reset();
								if (lockedProjectModal) lockedProjectModal.show();
								if (lockedProjectPassword) {
									setTimeout(() => lockedProjectPassword.focus(), 150);
								}
								return;
							}
							// Toggle expanded class on clicked card
							this.classList.toggle('expanded');
						});
					});

					if (lockedProjectForm) {
						lockedProjectForm.addEventListener('submit', function(event) {
							event.preventDefault();
							if (!lockedProjectPassword || !lockedProjectFeedback) return;

							if (lockedProjectPassword.value.trim() === lockedPassword) {
								lockedProjectFeedback.textContent = 'Access granted.';
								lockedProjectFeedback.classList.add('is-success');
								window.location.href = lockedDestination;
								return;
							}

							lockedProjectFeedback.textContent = 'Incorrect password. Please try again.';
							lockedProjectFeedback.classList.remove('is-success');
							lockedProjectPassword.focus();
							lockedProjectPassword.select();
						});
					}

					if (lockedModalElement) {
						lockedModalElement.addEventListener('hidden.bs.modal', function() {
							if (lockedProjectForm) lockedProjectForm.reset();
							if (lockedProjectFeedback) {
								lockedProjectFeedback.textContent = '';
								lockedProjectFeedback.classList.remove('is-success');
							}
						});
					}

					filterPills.forEach(pill => {
						pill.addEventListener('click', function() {
						// Remove active class from all pills
						filterPills.forEach(p => p.classList.remove('active'));
						// Add active class to clicked pill
						this.classList.add('active');

						// Remove expanded state from all cards when filtering
						artCards.forEach(card => card.classList.remove('expanded'));

						const filter = this.getAttribute('data-filter');

						// First, add the hidden class to cards that don't match the filter
						artCards.forEach(card => {
							if (filter === 'all' || card.getAttribute('data-category') === filter) {
								card.classList.remove('hidden');
							} else {
								card.classList.add('hidden');
							}
						});

						// After the fade-out animation, update the grid layout
						setTimeout(() => {
							artCards.forEach(card => {
								if (filter === 'all' || card.getAttribute('data-category') === filter) {
									card.style.display = 'block';
								} else {
									card.style.display = 'none';
								}
							});
						}, 500); // Match this with the CSS transition duration
					});
				});
			});
